<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table in table</title>
</head>

<body>
    <center>
    <table border="">
        <tr align="center">
            <td colspan="2" >
                <i>A more complex table-within-a table.</i>
            </td>
        </tr>
        <tr>
            <th bgcolor="orange">Outer Table</th>
            <td>
                An inner table showing a variety of headings and data items.
                <table border="">
                    <tr>
                        <th colspan="5">Inner Table</th>
                    </tr>
                    <tr>
                        <th colspan="2" rowspan="2">Corner</th>
                        <th colspan="3">Head1</th>
                    </tr>
                    <tr>
                        <th rowspan="2">Head2</th>
                        <th colspan="2">Head3</th>
                    </tr>
                    <tr>
                        <th>Head4</th>
                        <th>Head5</th>
                        <th>Head6</th>
                    </tr>
                    <tr>
                        <td>A</td>
                        <td rowspan="2" bgcolor="lightblue">Two Tall</td>
                        <td bgcolor="green">
                            <ul>
                                <li>Lists can be table data</li>
                                <li>Images can be table data</li>
                            </ul>
                        </td>
                        <td colspan="2">
                            <center>Two Wide</center>
                        </td>
                    </tr>
                    <tr>
                        <td>B</td>
                        <td>
                            <center>
                                <img src="https://img.freepik.com/premium-photo/html-file-3d-icon-isolated-white-background_1108860-1430.jpg?w=360"
                                    alt="image" height="100px">
                            </center>
                        </td>
                        <td>No Border <br> <b>Little</b><br>
                            table</td>
                        <td>
                            Multiple <br> line <br>item
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
    </center>
</body>

</html>
